name: Build Single EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\RandomScoreAllocatorWPF.csproj

      - name: Publish single-file EXE
        run: dotnet publish .\RandomScoreAllocatorWPF.csproj /p:PublishProfile=Properties\PublishProfiles\SingleFile-win-x64.pubxml

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: OfficeHelper-win-x64-single-exe
          path: .\bin\Release\net8.0-windows\publish\win-x64-single-file\
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .\bin\Release\net8.0-windows\publish\win-x64-single-file\RandomScoreAllocatorWPF.exe
          generate_release_notes: true
